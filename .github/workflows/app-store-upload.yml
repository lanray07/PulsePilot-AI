name: App Store Upload

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional App Store build number. Leave blank to use the GitHub run number."
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  upload:
    name: Archive and upload PulsePilot AI
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[appstore-upload]')) }}
    timeout-minutes: 45

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PROJECT: PulsePilotAI.xcodeproj
      SCHEME: PulsePilotAI
      BUNDLE_ID: com.pulsepilot.ai
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Validate required secrets
        run: |
          APPLE_TEAM_ID="$(printf "%s" "$APPLE_TEAM_ID" | tr -d '[:space:]')"
          ASC_KEY_ID="$(printf "%s" "$ASC_KEY_ID" | tr -d '[:space:]')"
          ASC_ISSUER_ID="$(printf "%s" "$ASC_ISSUER_ID" | tr -d '[:space:]')"

          {
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            echo "ASC_KEY_ID=$ASC_KEY_ID"
            echo "ASC_ISSUER_ID=$ASC_ISSUER_ID"
          } >> "$GITHUB_ENV"

          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured."
              missing=1
            fi
          done

          if [ "${#APPLE_TEAM_ID}" -ne 10 ]; then
            echo "::error::APPLE_TEAM_ID should be 10 characters after trimming whitespace."
            missing=1
          fi

          if [ "${#ASC_ISSUER_ID}" -ne 36 ]; then
            echo "::error::APP_STORE_CONNECT_ISSUER_ID should be a 36-character UUID after trimming whitespace."
            missing=1
          fi

          exit "$missing"

      - name: Write App Store Connect API key
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          ASC_API_KEY_NORMALIZED="${ASC_API_KEY//\\n/$'\n'}"
          printf "%s\n" "$ASC_API_KEY_NORMALIZED" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          if ! grep -q "BEGIN PRIVATE KEY" "$API_KEY_PATH"; then
            echo "::error::APP_STORE_CONNECT_API_KEY must contain the full .p8 private key text, including BEGIN PRIVATE KEY."
            exit 1
          fi

          if ! grep -q "END PRIVATE KEY" "$API_KEY_PATH"; then
            echo "::error::APP_STORE_CONNECT_API_KEY must contain the full .p8 private key text, including END PRIVATE KEY."
            exit 1
          fi

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Prepare export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
              <key>manageAppVersionAndBuildNumber</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Archive app
        run: |
          set -o pipefail

          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/PulsePilotAI.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive 2>&1 | tee "$RUNNER_TEMP/archive.log"

      - name: Export IPA
        run: |
          set -o pipefail

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PulsePilotAI.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" 2>&1 | tee "$RUNNER_TEMP/export.log"

          IPA_PATH="$(find "$RUNNER_TEMP/export" -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported."
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PulsePilotAI-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore

      - name: Upload Xcode logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PulsePilotAI-xcode-logs
          path: |
            ${{ runner.temp }}/archive.log
            ${{ runner.temp }}/export.log
          if-no-files-found: ignore
